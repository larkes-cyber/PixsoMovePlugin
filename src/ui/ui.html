<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Pixso Data Exporter</title>
</head>

<body>
  <main class="page-shell">
    <section class="container">
      <button id="openSettings" class="gear-button" type="button" aria-label="Открыть настройки">
        <svg class="gear-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
          <path fill="currentColor"
            d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.702-2.686.701-1.983 1.984l.169.31c.446.82.023 1.841-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.702 1.283.701 2.686 1.984 1.983l.31-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.702 2.686-.701 1.983-1.984l-.169-.31a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.702-1.283-.701-2.686-1.984-1.983l-.31.169a1.464 1.464 0 0 1-2.105-.872l-.1-.34zM8 10.93a2.93 2.93 0 1 1 0-5.86 2.93 2.93 0 0 1 0 5.86z" />
        </svg>
      </button>

      <h1>Pixso Data Exporter</h1>
      <p class="subtitle">Экспорт структуры страницы на сервер</p>

      <div class="selection-preview" id="selectionPreview">
        <div class="selection-preview-loading" id="selectionPreviewLoading">loading</div>
        <img alt="Selection preview" class="selection-preview-image" id="selectionPreviewImage" />
      </div>

      <div class="json-actions" id="json-actions">
        <div class="json-action-buttons">
          <div class="json-action-buttons-top"> <button class="utility-button" id="open-json-preview"
              type="button">Просмотреть JSON</button>
            <button class="utility-button" id="download-json" type="button">Скачать JSON</button>
          </div>
          <button class="utility-button" id="send-json" type="button">Отправить JSON на сервер</button>
        </div>
      </div>
    </section>
  </main>

  <div class="settings-overlay" id="settingsOverlay">
    <section class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="settings-header">
        <h2 id="settingsTitle">Настройки</h2>
        <button id="closeSettings" class="settings-close" type="button" aria-label="Закрыть настройки">✕</button>
      </div>

      <div class="settings-field">
        <label class="select-label" for="designSystem">Дизайн-система</label>
        <div class="select-wrapper">
          <select id="designSystem" class="select-control">
            <option value="nova">Nova</option>
            <option value="triplex">Triplex</option>
            <option value="atomic-ui">Atomic UI</option>
          </select>
        </div>
      </div>

      <div class="settings-field">
        <label class="select-label" for="teamInput">Название команды</label>
        <input id="teamInput" class="text-input" type="text" placeholder="Например: my-project" />
      </div>

      <div class="settings-field">
        <label class="select-label" for="sendEndpointInput">Эндпоинт для отправки данных</label>
        <input id="sendEndpointInput" class="text-input" type="text"
          placeholder="http://tslds-efs002866.cloud.delta.sbrf.ru:8080/components/send" />
      </div>
    </section>
  </div>

  <div class="json-preview-overlay" id="jsonPreviewOverlay">
    <section class="json-preview-modal" role="dialog" aria-modal="true" aria-labelledby="jsonPreviewTitle">
      <div class="json-preview-header">
        <h2 id="jsonPreviewTitle">Предпросмотр JSON</h2>
        <div class="json-preview-header-actions">
          <button class="copy-btn" id="copyBtn" type="button">Copy</button>
          <button id="closeJsonPreview" class="settings-close" type="button"
            aria-label="Закрыть предпросмотр JSON">✕</button>
        </div>
      </div>

      <div class="json-container" id="jsonContainer">
        <pre class="json-output" id="jsonOutput"></pre>
      </div>

      <p class="json-preview-note">
        Значение поля data отображается как объект для наглядности. При экспорте оно преобразуется в JSON-строку.
      </p>
    </section>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
</body>

</html>
